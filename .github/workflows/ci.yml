name: EGRET Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      MYSQL_DATABASE_URL: mysql://root:root@127.0.0.1:3306/egret_test
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: egret_test
      MONGODB_URL: mongodb://localhost:27017/egret_test
      FRONTEND_URL: http://localhost:3000
      BETTER_AUTH_SECRET: test-secret-key-access-token-12345678901234567890
      BETTER_AUTH_URL: http://localhost:8000/api/auth

    services:
      mysql:
        image: mysql:9.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: egret_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      mongodb:
        image: mongo:8.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install

      - name: Run Prisma Generate
        run: bunx prisma generate

      - name: Run Migrations (Test DB)
        run: bunx prisma migrate deploy

      - name: Type Check
        run: bunx tsc --noEmit

      - name: Run Tests
        run: bun test
